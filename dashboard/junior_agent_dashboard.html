<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junior Agent Dashboard - TaskFlow CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        * { box-sizing:border-box; }
        body { font-family:'Inter',system-ui,sans-serif; overflow:hidden; height:100vh; background:#f8fafc; margin:0; display:flex; }
        ::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:10px; }
        .side-nav { width:70px; background:#0f172a; height:100vh; display:flex; flex-direction:column; align-items:center; padding:15px 0; gap:8px; border-right:1px solid #1e293b; flex-shrink:0; overflow:hidden; }
        .nav-item { display:flex; flex-direction:column; align-items:center; gap:6px; color:#94a3b8; transition:all .2s; cursor:pointer; text-decoration:none; padding:8px; border-radius:8px; width:50px; }
        .nav-item:hover,.nav-item.active { color:#fff; background:rgba(255,255,255,.08); }
        .nav-item i { font-size:16px; } .nav-text { font-size:7px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; text-align:center; }
        .main { display:flex; gap:.6rem; height:100vh; padding:.6rem; flex:1; min-width:0; }
        .card { background:#fff; border-radius:18px; border:1px solid #f1f5f9; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 2px 16px rgba(0,0,0,.05); }
        .dark-hdr { background:#0f172a; padding:0 14px; display:flex; align-items:center; gap:10px; min-height:44px; flex-shrink:0; }
        .task-item { display:flex; align-items:flex-start; gap:10px; padding:10px 12px; border-radius:10px; margin-bottom:5px; border:1px solid #f1f5f9; background:#fafbfc; transition:all .15s; }
        .task-item:hover { background:#f1f5f9; border-color:#e2e8f0; }
        .task-check { width:16px; height:16px; border-radius:5px; border:2px solid #cbd5e1; flex-shrink:0; margin-top:1px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
        .task-check.done { background:#16a34a; border-color:#16a34a; }
        .stat-card { padding:14px 16px; border-radius:14px; border:1px solid #f1f5f9; background:#fff; box-shadow:0 2px 12px rgba(0,0,0,.04); }
        .stat-val { font-size:26px; font-weight:900; line-height:1; }
        .stat-lbl { font-size:7.5px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:.07em; margin-top:4px; }
        .followup-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:10px; border:1px solid #f1f5f9; background:#fafbfc; margin-bottom:5px; cursor:pointer; transition:background .1s; }
        .followup-item:hover { background:#f1f5f9; }
        .avatar { border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; color:#fff; flex-shrink:0; }
        .badge { display:inline-flex; align-items:center; padding:2px 7px; border-radius:99px; font-size:8px; font-weight:800; text-transform:uppercase; white-space:nowrap; }
    </style>
</head>
<body>
<nav class="side-nav">
    <div class="mb-6"><div class="w-8 h-8 bg-white/10 rounded-lg flex items-center justify-center"><i class="fa-solid fa-bolt text-white text-sm"></i></div></div>
    <a href="junior_agent_dashboard.html" class="nav-item active"><i class="fa-solid fa-gauge-high"></i><span class="nav-text">Dashboard</span></a>
    <a href="../task_and_followups/task_management.html" class="nav-item"><i class="fa-solid fa-tasks"></i><span class="nav-text">Tasks</span></a>
    <a href="../lead_management/lead_management.html" class="nav-item"><i class="fa-solid fa-user-group"></i><span class="nav-text">Leads</span></a>
    <a href="../documents/document_vault.html" class="nav-item"><i class="fa-solid fa-folder-open"></i><span class="nav-text">Docs</span></a>
    <div style="flex:1;"></div>
    <div class="nav-item" onclick="logout()" style="margin-bottom:8px;"><i class="fa-solid fa-right-from-bracket"></i><span class="nav-text">Logout</span></div>
</nav>

<main class="main" style="flex-direction:column;">
    <!-- Welcome + Stats row -->
    <div style="display:flex;gap:.6rem;flex-shrink:0;margin-bottom:.6rem;">
        <div class="card" style="flex:3;flex-direction:row;align-items:center;gap:16px;padding:14px 20px;">
            <div id="u-avatar" style="width:48px;height:48px;border-radius:50%;background:#7c3aed;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;flex-shrink:0;"></div>
            <div>
                <div style="font-size:12px;font-weight:800;color:#0f172a;" id="u-name">—</div>
                <div style="font-size:9px;color:#7c3aed;font-weight:700;background:#f5f3ff;padding:2px 8px;border-radius:99px;display:inline-block;margin-top:3px;" id="u-role">—</div>
            </div>
            <div style="flex:1;"></div>
            <div style="text-align:right;">
                <div style="font-size:8px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Live</div>
                <div id="clock" style="font-size:14px;font-weight:900;color:#0f172a;font-family:monospace;"></div>
            </div>
        </div>
        <div class="stat-card" style="flex:1;"><div class="stat-val text-violet-600" id="s-tasks">0</div><div class="stat-lbl">Tasks Today</div></div>
        <div class="stat-card" style="flex:1;"><div class="stat-val text-amber-500" id="s-followups">0</div><div class="stat-lbl">Follow-ups</div></div>
        <div class="stat-card" style="flex:1;"><div class="stat-val text-emerald-600" id="s-done">0</div><div class="stat-lbl">Completed</div></div>
        <div class="stat-card" style="flex:1;"><div class="stat-val text-red-500" id="s-overdue">0</div><div class="stat-lbl">Overdue</div></div>
    </div>

    <!-- Tasks + Follow-ups -->
    <div style="display:flex;gap:.6rem;flex:1;min-height:0;">
        <!-- Tasks -->
        <section class="card" style="flex:3;min-width:0;">
            <div class="dark-hdr">
                <i class="fa-solid fa-list-check text-white/40 text-sm flex-shrink-0"></i>
                <span style="font-size:9px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.12em;">My Tasks</span>
                <div class="flex-1"></div>
                <select id="f-priority" onchange="renderTasks()" style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:5px 22px 5px 9px;font-size:9px;font-weight:700;color:#d1d5db;outline:none;cursor:pointer;appearance:none;background-image:url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%278%27 height=%278%27 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%23ffffff60%27 stroke-width=%272.5%27%3E%3Cpath d=%27M6 9l6 6 6-6%27/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 6px center;">
                    <option value="">All Priority</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
                <a href="../task_and_followups/task_management.html" style="font-size:7px;font-weight:800;color:#6366f1;background:rgba(99,102,241,.15);padding:4px 8px;border-radius:6px;text-decoration:none;white-space:nowrap;">Full View</a>
            </div>
            <div class="flex-1 overflow-y-auto p-3" id="tasks-list"></div>
        </section>

        <!-- Follow-ups -->
        <section class="card" style="flex:2;min-width:0;">
            <div class="dark-hdr">
                <i class="fa-solid fa-phone-volume text-white/40 text-sm flex-shrink-0"></i>
                <span style="font-size:9px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.12em;">Follow-ups</span>
                <div class="flex-1"></div>
                <span id="fu-badge" style="font-size:7px;font-weight:800;background:#fef3c7;color:#b45309;padding:2px 8px;border-radius:99px;"></span>
            </div>
            <div class="flex-1 overflow-y-auto p-3" id="followups-list"></div>
        </section>

        <!-- Notes -->
        <section class="card" style="flex:2;min-width:0;">
            <div class="dark-hdr">
                <i class="fa-solid fa-note-sticky text-white/40 text-sm flex-shrink-0"></i>
                <span style="font-size:9px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.12em;">Quick Notes</span>
                <div class="flex-1"></div>
                <button onclick="addNote()" style="font-size:7px;font-weight:800;color:#6366f1;background:rgba(99,102,241,.15);padding:4px 8px;border-radius:6px;border:none;cursor:pointer;">+ Add</button>
            </div>
            <div class="flex-1 overflow-y-auto p-3" id="notes-list"></div>
        </section>
    </div>
</main>

<script>
const SESSION = JSON.parse(sessionStorage.getItem('crm_session')||'null');
if(!SESSION){ window.location.replace('../login/login.html'); }
function logout(){ sessionStorage.removeItem('crm_session'); window.location.replace('../login/login.html'); }

document.getElementById('u-name').textContent = SESSION?.name||'—';
document.getElementById('u-role').textContent = SESSION?.role||'—';
document.getElementById('u-avatar').textContent = SESSION?.avatar||'';
document.getElementById('u-avatar').style.background = SESSION?.avatarBg||'#7c3aed';

const TASKS = [
    {id:1,text:'Call James Smith re: mortgage docs',due:'Today',priority:'high',done:false},
    {id:2,text:'Send proposal to Williams & Co',due:'Today',priority:'high',done:false},
    {id:3,text:'Follow up ANZ application',due:'Tomorrow',priority:'medium',done:false},
    {id:4,text:'Upload Brown family payslips',due:'Today',priority:'high',done:true},
    {id:5,text:'Review Westpac lender terms',due:'This week',priority:'low',done:false},
    {id:6,text:'Schedule call with Oliver Jones',due:'Tomorrow',priority:'medium',done:false},
    {id:7,text:'Complete KYC for Noah Davis',due:'This week',priority:'low',done:false},
    {id:8,text:'Email lender confirmation to CBA',due:'Today',priority:'medium',done:false},
];
const FOLLOWUPS = [
    {id:1,name:'James Smith',lender:'ANZ',note:'Awaiting payslips',due:'Today',color:'#6366f1'},
    {id:2,name:'Oliver Jones',lender:'Westpac',note:'Proposal sent, follow up',due:'Today',color:'#0891b2'},
    {id:3,name:'Noah Williams',lender:'NAB',note:'KYC pending',due:'Tomorrow',color:'#16a34a'},
    {id:4,name:'Liam Brown',lender:'CBA',note:'Confirm lender decision',due:'Tomorrow',color:'#b45309'},
    {id:5,name:'Henry Davis',lender:'Macquarie',note:'Schedule valuation',due:'This week',color:'#7c3aed'},
];

let NOTES = JSON.parse(localStorage.getItem('ja_notes')||'[]');
if(!NOTES.length) NOTES=[{id:1,text:'Check ANZ rate sheet before Monday',color:'#fef9c3'},{id:2,text:'Remind Liam about ID docs',color:'#dbeafe'}];
let noteId = Math.max(0,...NOTES.map(n=>n.id))+1;
const NOTE_COLORS=['#fef9c3','#dcfce7','#dbeafe','#fce7f3','#f5f3ff'];

document.getElementById('s-tasks').textContent = TASKS.filter(t=>t.due==='Today'&&!t.done).length;
document.getElementById('s-followups').textContent = FOLLOWUPS.filter(f=>f.due==='Today').length;
document.getElementById('s-done').textContent = TASKS.filter(t=>t.done).length;
document.getElementById('s-overdue').textContent = 2;
document.getElementById('fu-badge').textContent = FOLLOWUPS.filter(f=>f.due==='Today').length+' due today';

function renderTasks(){
    const fp=document.getElementById('f-priority').value;
    const filtered=TASKS.filter(t=>!fp||t.priority===fp);
    const prioColor={high:'#b91c1c',medium:'#b45309',low:'#64748b'};
    const prioBg={high:'#fee2e2',medium:'#fef3c7',low:'#f1f5f9'};
    document.getElementById('tasks-list').innerHTML=filtered.map(t=>`
        <div class="task-item" style="${t.done?'opacity:.5;':''}">
            <div class="task-check ${t.done?'done':''}" onclick="toggleTask(${t.id})">
                ${t.done?'<i class="fa-solid fa-check" style="font-size:8px;color:#fff;"></i>':''}
            </div>
            <div style="flex:1;min-width:0;">
                <div style="font-size:10px;font-weight:600;color:#1e293b;${t.done?'text-decoration:line-through;':''}">${t.text}</div>
                <div style="display:flex;align-items:center;gap:5px;margin-top:3px;">
                    <span style="font-size:7px;font-weight:700;color:#94a3b8;">${t.due}</span>
                    <span style="font-size:7px;font-weight:800;padding:1px 6px;border-radius:99px;background:${prioBg[t.priority]};color:${prioColor[t.priority]};">${t.priority}</span>
                </div>
            </div>
        </div>`).join('');
}
function toggleTask(id){ const t=TASKS.find(x=>x.id===id); if(t){ t.done=!t.done; renderTasks(); document.getElementById('s-done').textContent=TASKS.filter(t=>t.done).length; } }

function renderFollowups(){
    document.getElementById('followups-list').innerHTML=FOLLOWUPS.map(f=>`
        <div class="followup-item">
            <div class="avatar" style="width:30px;height:30px;font-size:9px;background:${f.color};">${f.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
            <div style="flex:1;min-width:0;">
                <div style="font-size:10px;font-weight:700;color:#0f172a;">${f.name}</div>
                <div style="font-size:8px;color:#94a3b8;">${f.note}</div>
            </div>
            <div style="text-align:right;flex-shrink:0;">
                <div style="font-size:7.5px;font-weight:800;color:${f.due==='Today'?'#b91c1c':'#64748b'};">${f.due}</div>
                <div style="font-size:7px;color:#94a3b8;">${f.lender}</div>
            </div>
        </div>`).join('');
}

function renderNotes(){
    document.getElementById('notes-list').innerHTML=NOTES.map(n=>`
        <div style="background:${n.color};border-radius:10px;padding:10px 12px;margin-bottom:6px;position:relative;">
            <textarea onchange="updateNote(${n.id},this.value)" style="width:100%;background:transparent;border:none;outline:none;font-size:10px;font-weight:500;color:#1e293b;resize:none;min-height:36px;font-family:inherit;line-height:1.5;">${n.text}</textarea>
            <button onclick="deleteNote(${n.id})" style="position:absolute;top:6px;right:6px;border:none;background:rgba(0,0,0,.08);border-radius:4px;width:16px;height:16px;cursor:pointer;font-size:8px;color:#475569;display:flex;align-items:center;justify-content:center;"><i class="fa-solid fa-xmark"></i></button>
        </div>`).join('') +
        `<div onclick="addNote()" style="border:2px dashed rgba(0,0,0,.12);border-radius:10px;padding:12px;text-align:center;cursor:pointer;color:rgba(0,0,0,.25);font-size:8px;font-weight:700;">+ Add Note</div>`;
}
function addNote(){ NOTES.unshift({id:noteId++,text:'',color:NOTE_COLORS[NOTES.length%NOTE_COLORS.length]}); localStorage.setItem('ja_notes',JSON.stringify(NOTES)); renderNotes(); }
function deleteNote(id){ NOTES=NOTES.filter(n=>n.id!==id); localStorage.setItem('ja_notes',JSON.stringify(NOTES)); renderNotes(); }
function updateNote(id,v){ const n=NOTES.find(x=>x.id===id); if(n){ n.text=v; localStorage.setItem('ja_notes',JSON.stringify(NOTES)); } }

setInterval(()=>{ document.getElementById('clock').textContent=new Date().toLocaleTimeString(); },1000);
document.getElementById('clock').textContent=new Date().toLocaleTimeString();
renderTasks(); renderFollowups(); renderNotes();
</script>
</body>
</html>
