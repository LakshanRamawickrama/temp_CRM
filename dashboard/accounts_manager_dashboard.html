<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts Manager - TaskFlow CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        * { box-sizing:border-box; }
        body { font-family:'Inter',system-ui,sans-serif; overflow:hidden; height:100vh; background:#f8fafc; margin:0; display:flex; }
        ::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:10px; }
        .side-nav { width:70px; background:#0f172a; height:100vh; display:flex; flex-direction:column; align-items:center; padding:15px 0; gap:8px; border-right:1px solid #1e293b; flex-shrink:0; overflow:hidden; }
        .nav-item { display:flex; flex-direction:column; align-items:center; gap:6px; color:#94a3b8; transition:all .2s; cursor:pointer; text-decoration:none; padding:8px; border-radius:8px; width:50px; }
        .nav-item:hover,.nav-item.active { color:#fff; background:rgba(255,255,255,.08); }
        .nav-item i { font-size:16px; } .nav-text { font-size:7px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; text-align:center; }
        .main { display:flex; gap:.6rem; height:100vh; padding:.6rem; flex:1; min-width:0; flex-direction:column; }
        .card { background:#fff; border-radius:18px; border:1px solid #f1f5f9; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 2px 16px rgba(0,0,0,.05); }
        .dark-hdr { background:#0f172a; padding:0 14px; display:flex; align-items:center; gap:10px; min-height:44px; flex-shrink:0; }
        .badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:99px; font-size:8px; font-weight:800; text-transform:uppercase; white-space:nowrap; }
        .avatar { border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; color:#fff; flex-shrink:0; }
        .stat-card { padding:14px 16px; border-radius:14px; border:1px solid #f1f5f9; background:#fff; box-shadow:0 2px 12px rgba(0,0,0,.04); display:flex; flex-direction:column; flex:1; }
        .stat-val { font-size:24px; font-weight:900; line-height:1; }
        .stat-lbl { font-size:7px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:.07em; margin-top:4px; }
        .stat-sub { font-size:8px; font-weight:600; color:#64748b; margin-top:4px; }
        .data-table { width:100%; border-collapse:collapse; table-layout:fixed; }
        .data-table thead th { padding:8px 10px; font-size:8px; font-weight:800; color:#94a3b8; text-transform:uppercase; letter-spacing:.07em; background:#f8fafc; border-bottom:1px solid #f1f5f9; white-space:nowrap; position:sticky; top:0; z-index:1; text-align:left; }
        .data-table tbody tr { border-bottom:1px solid #f1f5f9; transition:background .1s; }
        .data-table tbody tr:hover { background:#f8fafc; }
        .data-table tbody td { padding:8px 10px; font-size:10px; color:#1e293b; font-weight:500; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; vertical-align:middle; text-align:left; }
        .tab-bar { display:flex; background:#0f172a; border-bottom:1px solid rgba(255,255,255,.06); flex-shrink:0; }
        .tab-btn { flex:1; padding:9px 4px; font-size:7px; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:#64748b; cursor:pointer; border:none; background:none; transition:all .2s; border-bottom:2px solid transparent; }
        .tab-btn.active { color:#fff; border-bottom-color:#d97706; }
        .tab-content { display:none; flex-direction:column; flex:1; overflow:hidden; min-height:0; }
        .tab-content.active { display:flex; }
    </style>
</head>
<body>
<nav class="side-nav">
    <div class="mb-6"><div class="w-8 h-8 bg-white/10 rounded-lg flex items-center justify-center"><i class="fa-solid fa-bolt text-white text-sm"></i></div></div>
    <a href="accounts_manager_dashboard.html" class="nav-item active"><i class="fa-solid fa-gauge-high"></i><span class="nav-text">Dashboard</span></a>
    <a href="../task_and_followups/task_management.html" class="nav-item"><i class="fa-solid fa-tasks"></i><span class="nav-text">Tasks</span></a>
    <a href="../lead_management/lead_management.html" class="nav-item"><i class="fa-solid fa-user-group"></i><span class="nav-text">Leads</span></a>
    <a href="../lenders/lender_management.html" class="nav-item"><i class="fa-solid fa-hand-holding-dollar"></i><span class="nav-text">Lenders</span></a>
    <a href="../documents/document_vault.html" class="nav-item"><i class="fa-solid fa-folder-open"></i><span class="nav-text">Docs</span></a>
    <a href="../reporting/reporting_logs.html" class="nav-item"><i class="fa-solid fa-chart-line"></i><span class="nav-text">Reports</span></a>
    <div style="flex:1;"></div>
    <div class="nav-item" onclick="logout()" style="margin-bottom:8px;"><i class="fa-solid fa-right-from-bracket"></i><span class="nav-text">Logout</span></div>
</nav>
<main class="main">
    <div style="display:flex;gap:.6rem;flex-shrink:0;">
        <div class="card" style="flex:2;flex-direction:row;align-items:center;gap:14px;padding:14px 18px;">
            <div id="u-avatar" style="width:44px;height:44px;border-radius:50%;background:#d97706;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;flex-shrink:0;"></div>
            <div>
                <div style="font-size:12px;font-weight:800;color:#0f172a;" id="u-name">Loading...</div>
                <div style="font-size:9px;font-weight:700;color:#b45309;background:#fef3c7;padding:2px 8px;border-radius:99px;display:inline-block;margin-top:3px;">Accounts Manager</div>
            </div>
            <div style="flex:1;"></div>
            <div style="text-align:right;"><div style="font-size:8px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Live</div>
            <div id="clock" style="font-size:14px;font-weight:900;color:#0f172a;font-family:monospace;"></div></div>
        </div>
        <div class="stat-card"><div class="stat-val text-amber-500" id="s-pending">0</div><div class="stat-lbl">Pending Payouts</div><div class="stat-sub" id="s-pending-val">-</div></div>
        <div class="stat-card"><div class="stat-val text-emerald-600" id="s-approved">0</div><div class="stat-lbl">Approved</div><div class="stat-sub" id="s-approved-val">-</div></div>
        <div class="stat-card"><div class="stat-val text-violet-600" id="s-lenders">0</div><div class="stat-lbl">Active Lenders</div><div class="stat-sub">On panel</div></div>
        <div class="stat-card"><div class="stat-val text-red-500" id="s-docs">0</div><div class="stat-lbl">Docs Overdue</div><div class="stat-sub">Needs action</div></div>
    </div>
    <div style="display:flex;gap:.6rem;flex:1;min-height:0;">
        <section class="card" style="flex:5;min-width:0;">
            <div class="dark-hdr">
                <i class="fa-solid fa-sterling-sign text-white/40 text-sm flex-shrink-0"></i>
                <span style="font-size:9px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.12em;">Payout Management</span>
                <div class="flex-1"></div>
                <select id="f-status" onchange="renderPayouts()" style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:5px 22px 5px 9px;font-size:9px;font-weight:700;color:#d1d5db;outline:none;cursor:pointer;appearance:none;">
                    <option value="">All Status</option><option>Pending</option><option>Approved</option><option>On Hold</option><option>Paid</option>
                </select>
                <span id="payout-total-hdr" style="font-size:9px;font-weight:900;color:#fbbf24;margin-left:8px;"></span>
            </div>
            <div class="flex-1 overflow-y-auto">
                <table class="data-table">
                    <colgroup><col style="width:20%;"><col style="width:18%;"><col style="width:12%;"><col style="width:13%;"><col style="width:12%;"><col style="width:11%;"><col style="width:14%;"></colgroup>
                    <thead><tr><th>Agent</th><th>Client</th><th>Lender</th><th>Amount</th><th>Status</th><th>Due</th><th>Actions</th></tr></thead>
                    <tbody id="payout-tbody"></tbody>
                </table>
            </div>
        </section>
        <section class="card" style="flex:3;min-width:0;">
            <div class="dark-hdr"><i class="fa-solid fa-layer-group text-white/40 text-sm"></i>
            <span style="font-size:9px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.1em;">Finance Centre</span></div>
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('lenders',this)">Lenders</button>
                <button class="tab-btn" onclick="switchTab('docs',this)">Documents</button>
                <button class="tab-btn" onclick="switchTab('summary',this)">Summary</button>
            </div>
            <div class="tab-content active" id="tab-lenders"><div class="flex-1 overflow-y-auto p-3" id="lenders-list"></div></div>
            <div class="tab-content" id="tab-docs">
                <div class="px-3 py-2 border-b border-gray-100 flex items-center justify-between flex-shrink-0">
                    <span style="font-size:7.5px;font-weight:800;text-transform:uppercase;color:#94a3b8;">Pending Documents</span>
                    <span id="docs-count" style="font-size:7px;font-weight:800;background:#fee2e2;color:#b91c1c;padding:1px 7px;border-radius:99px;"></span>
                </div>
                <div class="flex-1 overflow-y-auto p-3" id="docs-list"></div>
            </div>
            <div class="tab-content" id="tab-summary"><div class="flex-1 overflow-y-auto p-4" id="summary-content"></div></div>
        </section>
    </div>
</main>
<script>
const SESSION=JSON.parse(sessionStorage.getItem('crm_session')||'null');
if(!SESSION){window.location.replace('../login/login.html');}
function logout(){sessionStorage.removeItem('crm_session');window.location.replace('../login/login.html');}
if(SESSION){document.getElementById('u-name').textContent=SESSION.name||'Accounts Manager';document.getElementById('u-avatar').textContent=SESSION.avatar||'AM';if(SESSION.avatarBg)document.getElementById('u-avatar').style.background=SESSION.avatarBg;}
const PAYOUTS=[{id:1,agent:'Thanushika R.',client:'ABC Corp',lender:'Westpac',amt:12400,status:'Pending',due:'Today',ab:'#6366f1'},{id:2,agent:'Amal J.',client:'Brown Family',lender:'ANZ',amt:8750,status:'Pending',due:'Today',ab:'#0891b2'},{id:3,agent:'Ravindu P.',client:'XYZ Ltd',lender:'NAB',amt:21000,status:'Approved',due:'Tomorrow',ab:'#16a34a'},{id:4,agent:'Priya S.',client:'Patel Finance',lender:'CBA',amt:6500,status:'Pending',due:'Today',ab:'#b45309'},{id:5,agent:'Kasun M.',client:'Green & Co',lender:'Macquarie',amt:9300,status:'On Hold',due:'Next week',ab:'#7c3aed'},{id:6,agent:'Nirosha K.',client:'White Corp',lender:'Westpac',amt:15600,status:'Approved',due:'2 days',ab:'#b91c1c'},{id:7,agent:'Thanushika R.',client:'Miller Logistics',lender:'ANZ',amt:18200,status:'Paid',due:'Done',ab:'#6366f1'},{id:8,agent:'Amal J.',client:'Rivera Designs',lender:'NAB',amt:7400,status:'Pending',due:'Tomorrow',ab:'#0891b2'}];
const LENDERS=[{name:'Westpac',rate:'5.89%',maxLvr:'80%',status:'Active',deals:18,color:'#dc2626'},{name:'ANZ',rate:'5.74%',maxLvr:'85%',status:'Active',deals:24,color:'#2563eb'},{name:'NAB',rate:'5.99%',maxLvr:'80%',status:'Active',deals:15,color:'#16a34a'},{name:'CBA',rate:'5.69%',maxLvr:'90%',status:'Active',deals:31,color:'#d97706'},{name:'Macquarie',rate:'6.15%',maxLvr:'75%',status:'Review',deals:9,color:'#7c3aed'}];
const DOCS=[{client:'ABC Corp',type:'Payslips x3',agent:'Thanushika R.',overdue:'2 days',urgent:true},{client:'Brown Family',type:'Bank Statements',agent:'Amal J.',overdue:'Today',urgent:true},{client:'XYZ Ltd',type:'ID Verification',agent:'Ravindu P.',overdue:'1 day',urgent:true},{client:'Patel Finance',type:'Tax Returns',agent:'Priya S.',overdue:'3 days',urgent:false}];
function updateStats(){const pend=PAYOUTS.filter(p=>p.status==='Pending');const appr=PAYOUTS.filter(p=>p.status==='Approved');document.getElementById('s-pending').textContent=pend.length;document.getElementById('s-pending-val').textContent='Total: £'+pend.reduce((s,p)=>s+p.amt,0).toLocaleString();document.getElementById('s-approved').textContent=appr.length;document.getElementById('s-approved-val').textContent='Total: £'+appr.reduce((s,p)=>s+p.amt,0).toLocaleString();document.getElementById('s-lenders').textContent=LENDERS.filter(l=>l.status==='Active').length;document.getElementById('s-docs').textContent=DOCS.filter(d=>d.urgent).length;}
const SS={Pending:'background:#fef3c7;color:#b45309',Approved:'background:#dcfce7;color:#15803d','On Hold':'background:#fee2e2;color:#b91c1c',Paid:'background:#f1f5f9;color:#64748b'};
function renderPayouts(){const fs=document.getElementById('f-status').value;const rows=PAYOUTS.filter(p=>!fs||p.status===fs);document.getElementById('payout-total-hdr').textContent='Total: £'+rows.reduce((s,p)=>s+p.amt,0).toLocaleString();document.getElementById('payout-tbody').innerHTML=rows.map(p=>'<tr><td><div style="display:flex;align-items:center;gap:6px;"><div class="avatar" style="width:22px;height:22px;font-size:7px;background:'+p.ab+';">'+p.agent.slice(0,2).toUpperCase()+'</div><span>'+p.agent+'</span></div></td><td>'+p.client+'</td><td style="color:#64748b;">'+p.lender+'</td><td style="font-weight:800;">£'+p.amt.toLocaleString()+'</td><td><span class="badge" style="'+SS[p.status]+'">'+p.status+'</span></td><td style="font-size:9px;color:'+(p.due==='Today'?'#b91c1c':'#64748b')+';font-weight:700;">'+p.due+'</td><td><div style="display:flex;gap:3px;">'+(p.status==='Pending'?'<button onclick="approvePayout('+p.id+')" style="font-size:7px;font-weight:800;padding:3px 7px;border-radius:5px;background:#dcfce7;color:#15803d;border:none;cursor:pointer;">Approve</button>':'')+(p.status==='Approved'?'<button onclick="markPaid('+p.id+')" style="font-size:7px;font-weight:800;padding:3px 7px;border-radius:5px;background:#dbeafe;color:#1d4ed8;border:none;cursor:pointer;">Mark Paid</button>':'')+'</div></td></tr>').join('');}
function approvePayout(id){const p=PAYOUTS.find(x=>x.id===id);if(p){p.status='Approved';renderPayouts();updateStats();}}
function markPaid(id){const p=PAYOUTS.find(x=>x.id===id);if(p){p.status='Paid';renderPayouts();updateStats();}}
function renderLenders(){document.getElementById('lenders-list').innerHTML=LENDERS.map(l=>'<div style="display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;border:1px solid #f1f5f9;background:#fafbfc;margin-bottom:5px;"><div style="width:32px;height:32px;border-radius:8px;background:'+l.color+'22;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="fa-solid fa-building-columns" style="font-size:12px;color:'+l.color+';"></i></div><div style="flex:1;min-width:0;"><div style="font-size:10px;font-weight:700;color:#0f172a;">'+l.name+'</div><div style="font-size:8px;color:#94a3b8;">Rate: '+l.rate+' · Max LVR: '+l.maxLvr+'</div></div><div style="text-align:right;flex-shrink:0;"><span class="badge" style="background:'+(l.status==='Active'?'#dcfce7':'#fef3c7')+';color:'+(l.status==='Active'?'#15803d':'#b45309')+';">'+l.status+'</span><div style="font-size:7px;color:#94a3b8;margin-top:2px;">'+l.deals+' deals</div></div></div>').join('');}
function renderDocs(){document.getElementById('docs-count').textContent=DOCS.filter(d=>d.urgent).length+' urgent';document.getElementById('docs-list').innerHTML=DOCS.map(d=>'<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;border:1px solid #f1f5f9;background:#fafbfc;margin-bottom:5px;"><div style="width:30px;height:30px;border-radius:8px;background:'+(d.urgent?'#fee2e2':'#f1f5f9')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="fa-solid fa-file-circle-exclamation" style="font-size:12px;color:'+(d.urgent?'#b91c1c':'#64748b')+';"></i></div><div style="flex:1;min-width:0;"><div style="font-size:10px;font-weight:700;color:#0f172a;">'+d.client+'</div><div style="font-size:8px;color:#94a3b8;">'+d.type+' · '+d.agent+'</div></div><div style="text-align:right;flex-shrink:0;"><div style="font-size:8px;font-weight:800;color:'+(d.urgent?'#b91c1c':'#64748b')+';">'+d.overdue+'</div></div></div>').join('');}
function renderSummary(){const tp=PAYOUTS.filter(p=>p.status==='Paid').reduce((s,p)=>s+p.amt,0);const tpend=PAYOUTS.filter(p=>p.status==='Pending').reduce((s,p)=>s+p.amt,0);document.getElementById('summary-content').innerHTML='<p style="font-size:7.5px;font-weight:800;text-transform:uppercase;color:#94a3b8;margin-bottom:10px;">Monthly Summary</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;"><div style="padding:10px 12px;border-radius:10px;background:#dcfce7;"><div style="font-size:7px;font-weight:800;text-transform:uppercase;color:#15803d;margin-bottom:4px;">Total Paid Out</div><div style="font-size:16px;font-weight:900;color:#0f172a;">£'+tp.toLocaleString()+'</div></div><div style="padding:10px 12px;border-radius:10px;background:#fef3c7;"><div style="font-size:7px;font-weight:800;text-transform:uppercase;color:#b45309;margin-bottom:4px;">Pending Value</div><div style="font-size:16px;font-weight:900;color:#0f172a;">£'+tpend.toLocaleString()+'</div></div></div><p style="font-size:7.5px;font-weight:800;text-transform:uppercase;color:#94a3b8;margin-bottom:8px;">Lender Volume</p>'+LENDERS.map(l=>'<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;"><div style="font-size:8px;font-weight:700;color:#475569;width:80px;text-align:right;">'+l.name+'</div><div style="flex:1;background:#f1f5f9;border-radius:99px;height:5px;overflow:hidden;"><div style="width:'+Math.round(l.deals/31*100)+'%;height:100%;border-radius:99px;background:'+l.color+';"></div></div><div style="font-size:8px;font-weight:800;color:#1e293b;width:24px;text-align:right;">'+l.deals+'</div></div>').join('');}
function switchTab(name,btn){document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById('tab-'+name).classList.add('active');btn.classList.add('active');}
setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString();},1000);
document.getElementById('clock').textContent=new Date().toLocaleTimeString();
updateStats();renderPayouts();renderLenders();renderDocs();renderSummary();
</script>
</body>
</html>
