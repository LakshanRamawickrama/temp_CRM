<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        function logout() { sessionStorage.removeItem('crm_session'); window.location.replace('../login/login.html'); } (function () { const s = sessionStorage.getItem('crm_session'); if (!s) { window.location.replace('../login/login.html'); } })();</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Detail - Alpha Funding CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            background: #fff;
            margin: 0;
            display: flex;
        }

        ::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .main-wrap {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
            background: #fafafa;
            overflow: hidden;
        }

        .top-bar {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 11px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 14px 16px;
        }

        /* Single master table */
        .master-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        /* Section header row */
        .sec-row td {
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            padding: 5px 14px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: #64748b;
        }

        .sec-row:first-child td {
            border-top: none;
        }

        /* Label cell */
        .lbl {
            width: 130px;
            padding: 6px 14px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: #94a3b8;
            border-bottom: 1px solid #f1f5f9;
            white-space: nowrap;
            vertical-align: middle;
        }

        /* Value cell */
        .val {
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 600;
            color: #0f172a;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }

        /* Divider between paired columns */
        .divider {
            width: 1px;
            background: #f1f5f9;
            padding: 0;
            border-bottom: 1px solid #f1f5f9;
        }

        tr:hover .lbl,
        tr:hover .val {
            background: #f8fafc;
        }

        .sec-row:hover td {
            background: #f8fafc;
        }

        /* Doc sub-rows */
        .doc-lbl {
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: #94a3b8;
            padding: 5px 14px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .doc-val {
            padding: 5px 14px;
            font-size: 10px;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }

        tr:hover .doc-val {
            background: #f8fafc;
        }

        /* Timeline rows */
        .tl-val {
            padding: 6px 14px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: top;
        }

        tr:hover .tl-val {
            background: #f8fafc;
        }

        /* Note rows */
        .note-val {
            padding: 6px 14px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: top;
        }

        tr:hover .note-val {
            background: #f8fafc;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            border-radius: 7px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .05em;
            cursor: pointer;
            border: none;
            transition: all .15s;
            font-family: 'Inter', sans-serif;
        }

        .btn-ghost {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-ghost:hover {
            background: #e2e8f0;
        }

        .btn-indigo {
            background: #eef2ff;
            color: #4338ca;
        }

        .btn-indigo:hover {
            background: #e0e7ff;
        }

        .btn-dark {
            background: #0f172a;
            color: #fff;
        }

        .btn-dark:hover {
            background: #000;
        }

        .btn-red {
            background: #fef2f2;
            color: #b91c1c;
        }

        .btn-red:hover {
            background: #fee2e2;
        }

        .side-nav {
            width: 70px;
            background: #0f172a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 4px;
            border-right: 1px solid #1e293b;
            flex-shrink: 0;
            overflow: hidden;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #94a3b8;
            transition: all .2s;
            cursor: pointer;
            text-decoration: none;
            padding: 6px 4px;
            border-radius: 8px;
            width: 54px;
        }

        .nav-item:hover,
        .nav-item.active {
            color: #fff;
            background: rgba(255, 255, 255, .08);
        }

        .nav-item i {
            font-size: 14px;
        }

        .nav-text {
            font-size: 7px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            text-align: center;
            line-height: 1;
        }
    </style>
</head>

<body>

    <nav class="side-nav" id="side-nav">
        <!-- Sidebar items injected via JS -->
    </nav>

    <div class="main-wrap">

        <div class="top-bar">
            <div class="flex items-center gap-3">
                <button onclick="history.back()" class="btn btn-ghost">
                    <i class="fa-solid fa-arrow-left text-[9px]"></i> Back
                </button>
                <div class="w-px h-5 bg-gray-200"></div>
                <div>
                    <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest" id="hdr-id"></p>
                    <h1 class="text-sm font-black text-gray-900 tracking-tight leading-tight" id="hdr-name"></h1>
                </div>

        </div>

        <div class="content-area">
            <table class="master-table" id="master-table">
                <!-- Content injected via JS -->
            </table>
        </div>

    </div>

    <script>
        function logout() { sessionStorage.removeItem('crm_session'); window.location.replace('../login/login.html'); }
        const leads = [
            { id: 'AF-028', name: 'Minosh Example', business: 'ex ABC', amount: '£3,456', agent: 'Sarah White', bank: 'Starling', stage: 'verified', priority: 'High', days: 3, lender: 'NAB', notes: 'Awaiting final sign-off.', payoutStatus: 'Yes' },
            { id: 'AF-027', name: 'ABC Corp', business: 'ABCD Ltd', amount: '£2,345', agent: 'Cody Lane', bank: '—', stage: 'verified', priority: 'Medium', days: 5, lender: 'Commonwealth Bank', notes: 'Docs reviewed, all clear.', payoutStatus: 'No' },
            { id: 'AF-026', name: 'Kavi', business: 'No Company', amount: '£34,567', agent: 'Sarah White', bank: '—', stage: 'collecting', priority: 'Low', days: 8, lender: '—', notes: 'Waiting on bank statements.', payoutStatus: 'No' },
            { id: 'AF-029', name: 'Priya', business: 'No Company', amount: '£456.90', agent: 'Sarah White', bank: '—', stage: 'collecting', priority: 'Medium', days: 2, lender: '—', notes: 'ID docs pending.', payoutStatus: 'No' },
            { id: 'AF-025', name: 'John', business: 'ex Company', amount: '£456.90', agent: 'Jane Doe', bank: '—', stage: 'verified', priority: 'Low', days: 6, lender: '—', notes: 'All documents verified.', payoutStatus: 'No' },
            { id: 'AF-001', name: 'Robert Miller', business: 'Miller Logistics', amount: '£250,000', agent: 'Cody Lane', bank: 'Barclays', stage: 'collecting', priority: 'High', days: 12, lender: '—', notes: 'Missing payslips x3.', payoutStatus: 'No' },
            { id: 'AF-002', name: 'Alice Huang', business: 'Huang Tech', amount: '£1,200,000', agent: 'Leo Kumar', bank: 'HSBC', stage: 'lender', priority: 'High', days: 4, lender: 'ANZ', notes: 'Shortlisting lenders.', payoutStatus: 'No' },
            { id: 'AF-011', name: 'Bruce Wayne', business: 'Wayne Enterprises', amount: '£50,000,000', agent: 'Priya Sharma', bank: 'HSBC', stage: 'lender', priority: 'High', days: 7, lender: '—', notes: 'Multiple lenders contacted.', payoutStatus: 'No' },
            { id: 'AF-003', name: 'David Rivera', business: 'Rivera Designs', amount: '£85,000', agent: 'Priya Sharma', bank: '—', stage: 'approved', priority: 'Medium', days: 1, lender: 'Westpac', notes: 'Approval letter received.', payoutStatus: 'Yes' },
            { id: 'AF-004', name: 'Sarah Connor', business: 'Connor Security', amount: '£120,000', agent: 'Jane Doe', bank: '—', stage: 'rejected', priority: 'Low', days: 20, lender: '—', notes: 'Credit score insufficient.', payoutStatus: 'No' },
            { id: 'AF-005', name: 'Michael Scott', business: 'Dunder Mifflin', amount: '£18,500', agent: 'Leo Kumar', bank: 'Barclays', stage: 'completed', priority: 'Low', days: 0, lender: 'ANZ', notes: 'Funds disbursed. Case closed.', payoutStatus: 'Yes' },
            { id: 'AF-006', name: 'James Carter', business: 'Carter Holdings', amount: '£500,000', agent: 'Jane Doe', bank: 'HSBC', stage: 'approved', priority: 'High', days: 2, lender: 'NAB', notes: 'Awaiting drawdown date.', payoutStatus: 'No' },
        ];

        const lendersDB = {
            'NAB': { contact: 'Mark Sterling', email: 'm.sterling@nab-business.com', terms: 'Next Day Payout', phone: '+44 20 7123 4567' },
            'Commonwealth Bank': { contact: 'Sarah Jenkins', email: 's.jenkins@cba.com', terms: '3-Day Settlement', phone: '+44 20 7987 6543' },
            'ANZ': { contact: 'David Low', email: 'd.low@anz.bank', terms: 'Standard Terms', phone: '+44 20 8888 7777' },
            'Westpac': { contact: 'Emily Thorne', email: 'e.thorne@westpac.com', terms: 'Instant Payout', phone: '+44 20 6666 5555' },
            'Lloyds Bank': { contact: 'Robert Vance', email: 'r.vance@lloyds.com', terms: '2-Day Payout', phone: '+44 20 4444 3333' }
        };

        const STAGE_ORDER = ['collecting', 'verified', 'lender', 'approved', 'completed'];
        const STAGE_LABELS = { collecting: 'Doc Collection', verified: 'Doc Verified', lender: 'Lender Selection', approved: 'Loan Approved', completed: 'Completed', rejected: 'Rejected' };
        const stageAccent = { collecting: '#64748b', verified: '#3b82f6', lender: '#8b5cf6', approved: '#22c55e', completed: '#0f172a', rejected: '#ef4444' };
        const stageBg = { collecting: '#f1f5f9', verified: '#eff6ff', lender: '#f5f3ff', approved: '#f0fdf4', completed: '#f1f5f9', rejected: '#fef2f2' };
        const prioStyle = { High: 'background:#fee2e2;color:#b91c1c;border:1px solid #fecaca', Medium: 'background:#fffbeb;color:#92400e;border:1px solid #fde68a', Low: 'background:#f0fdf4;color:#166534;border:1px solid #bbf7d0' };

        const params = new URLSearchParams(window.location.search);
        const stored = sessionStorage.getItem('crm_lead_detail');
        let lead;
        if (stored) {
            const parsed = JSON.parse(stored);
            if (parsed.id === params.get('id')) {
                lead = parsed;
                sessionStorage.removeItem('crm_lead_detail');
            }
        }
        if (!lead) lead = leads.find(l => l.id === params.get('id')) || leads[0];
        document.title = lead.name + ' — Alpha Funding CRM';

        let isEditing = false;

        function renderHeader() {
            document.getElementById('hdr-id').textContent = '#' + lead.id;
            document.getElementById('hdr-name').textContent = lead.name;
            document.getElementById('hdr-badges').innerHTML = `
                <span style="${prioStyle[lead.priority]};padding:2px 9px;border-radius:20px;font-size:8px;font-weight:700">${lead.priority} Priority</span>
                <span style="background:${stageBg[lead.stage]};color:${stageAccent[lead.stage]};border:1px solid ${stageAccent[lead.stage]}33;padding:2px 9px;border-radius:20px;font-size:8px;font-weight:700">${STAGE_LABELS[lead.stage]}</span>`;
            
            if (isEditing) {
                document.getElementById('hdr-actions').innerHTML = `
                    <button onclick="saveChanges()" class="btn btn-indigo"><i class="fa-solid fa-check"></i> Save Changes</button>
                    <button onclick="toggleEdit()" class="btn btn-ghost"><i class="fa-solid fa-xmark"></i> Cancel</button>`;
            } else {
                document.getElementById('hdr-actions').innerHTML = `
                    <button onclick="toggleEdit()" class="btn btn-ghost"><i class="fa-solid fa-pen"></i> Edit</button>`;
            }
        }

        function toggleEdit() {
            isEditing = !isEditing;
            renderHeader();
            updateMasterTable();
        }

        function saveChanges() {
            // Basic data update
            lead.name = document.getElementById('edit-name')?.value || lead.name;
            lead.business = document.getElementById('edit-business')?.value || lead.business;
            lead.agent = document.getElementById('edit-agent')?.value || lead.agent;
            lead.priority = document.getElementById('edit-priority')?.value || lead.priority;
            lead.bank = document.getElementById('edit-bank')?.value || lead.bank;
            lead.lender = document.getElementById('edit-lender')?.value || lead.lender;
            lead.stage = document.getElementById('edit-stage')?.value || lead.stage;
            
            const amt = document.getElementById('edit-amount')?.value;
            if (amt !== undefined) lead.amount = '£' + amt.replace('£', '').trim();

            isEditing = false;
            renderHeader();
            updateMasterTable();
        }

        function editField(key, value, type = 'text') {
            if (!isEditing) return value;
            const common = `class="w-full border border-indigo-200 rounded px-2 py-1 text-[10px] font-bold outline-none focus:ring-1 ring-indigo-500"`;
            
            if (key === 'priority') {
                return `<select id="edit-priority" ${common}>
                    <option ${value === 'High' ? 'selected' : ''}>High</option>
                    <option ${value === 'Medium' ? 'selected' : ''}>Medium</option>
                    <option ${value === 'Low' ? 'selected' : ''}>Low</option>
                </select>`;
            }
            if (key === 'stage') {
                return `<select id="edit-stage" ${common}>
                    ${Object.entries(STAGE_LABELS).map(([k, v]) => `<option value="${k}" ${lead.stage === k ? 'selected' : ''}>${v}</option>`).join('')}
                </select>`;
            }
            if (key === 'amount') {
                return `<input id="edit-amount" type="text" value="${value.toString().replace('£','')}" ${common}>`;
            }
            return `<input id="edit-${key}" type="${type}" value="${value}" ${common}>`;
        }

        // Initial Header Render
        renderHeader();

        // Documents
        const docs = [
            { name: 'Passport_ID.pdf', type: 'Identity', by: lead.agent, date: '2026-03-11', status: 'Verified' },
            { name: 'Bank_Statement_3mo.pdf', type: 'Financial', by: lead.agent, date: '2026-03-12', status: 'Verified' },
            { name: 'Payslips_x3.pdf', type: 'Income', by: lead.agent, date: '2026-03-14', status: lead.stage === 'collecting' ? 'Pending' : 'Verified' },
            { name: 'Employment_Letter.pdf', type: 'Employment', by: lead.agent, date: '2026-03-15', status: lead.stage === 'collecting' ? 'Missing' : 'Verified' },
            { name: 'Credit_Report.pdf', type: 'Credit', by: 'System', date: '2026-03-16', status: lead.stage === 'rejected' ? 'Failed' : 'Verified' },
        ];

        // Timeline
        const stageStep = STAGE_ORDER.indexOf(lead.stage);
        const isRejected = lead.stage === 'rejected';
        const tlSteps = [
            { icon: 'fa-plus', color: '#6366f1', label: 'Lead Created', sub: 'By ' + lead.agent, time: '2026-03-10 09:12', minStage: 0 },
            { icon: 'fa-file-arrow-up', color: '#3b82f6', label: 'Documents Collected', sub: 'All files submitted', time: '2026-03-14 14:05', minStage: 1 },
            { icon: 'fa-file-circle-check', color: '#10b981', label: 'Documents Verified', sub: 'Reviewed & approved', time: '2026-03-17 11:20', minStage: 2 },
            { icon: 'fa-building-columns', color: '#8b5cf6', label: 'Lender Selected', sub: 'Shortlist confirmed', time: '2026-03-25 10:00', minStage: 3 },
            isRejected
                ? { icon: 'fa-circle-xmark', color: '#ef4444', label: 'Loan Rejected', sub: 'Application declined', time: '2026-04-01 09:00', minStage: 4 }
                : { icon: 'fa-circle-check', color: '#22c55e', label: 'Loan Confirmed', sub: 'Funds approved', time: '2026-04-01 09:00', minStage: 4 },
        ];
        const timeline = tlSteps.map(t => ({
            ...t,
            done: isRejected ? (t.minStage < 4) : (t.minStage <= stageStep),
        }));

        // Reminders
        const reminders = [
            { type: 'Call', title: 'Follow up on bank statements', assignee: lead.agent, due: '2026-04-18', status: 'Pending' },
            { type: 'Meeting', title: 'Lender introduction call', assignee: lead.agent, due: '2026-04-20', status: 'Pending' },
            { type: 'Follow-up', title: 'Check document verification', assignee: lead.agent, due: '2026-04-12', status: 'Overdue' },
            { type: 'Document', title: 'Request updated payslips', assignee: 'Sarah White', due: '2026-04-15', status: 'Completed' },
        ];

        // Notes
        const notes = [
            { author: 'Sarah White', time: '2026-04-10 10:22', text: lead.notes },
            { author: 'Cody Lane', time: '2026-04-08 15:40', text: 'Client confirmed availability for lender call next week.' },
            { author: 'System', time: '2026-04-07 09:00', text: 'Automated reminder sent to client for outstanding documents.' },
        ];

        function row(l1, v1, l2, v2) {
            if (l2 !== undefined) {
                return `<tr>
                    <td class="lbl">${l1}</td><td class="val">${v1}</td>
                    <td class="divider"></td>
                    <td class="lbl">${l2}</td><td class="val">${v2}</td>
                </tr>`;
            }
            return `<tr><td class="lbl">${l1}</td><td class="val" colspan="4">${v1}</td></tr>`;
        }

        function updateMasterTable() {
            // Sidebar Role Based Logic
            const SESSION = JSON.parse(sessionStorage.getItem('crm_session') || '{}');
            const role = SESSION.role || 'Tele Agent';
            const nav = document.getElementById('side-nav');
            if (nav) {
                let navHtml = `
                    <div class="mb-6">
                        <img src="../logo/alpha.png" alt="Alpha Funding" style="width:38px;height:38px;object-fit:contain;border-radius:8px;">
                    </div>
                    <a href="${SESSION.landing || '../dashboard/tele_agent_dashboard.html'}" class="nav-item"><i class="fa-solid fa-house"></i><span class="nav-text">Dashboard</span></a>
                    <a href="../task_and_followups/task_management.html" class="nav-item"><i class="fa-solid fa-tasks"></i><span class="nav-text">Tasks</span></a>
                    <a href="../lead_management/lead_management.html" class="nav-item"><i class="fa-solid fa-user-group"></i><span class="nav-text">Leads</span></a>`;

                if (role === 'Accounts Manager') {
                    navHtml += `<a href="../lenders/lender_management.html" class="nav-item"><i class="fa-solid fa-hand-holding-dollar"></i><span class="nav-text">Lenders</span></a>`;
                } else if (role === 'Admin') {
                    navHtml += `
                    <a href="loan_pipeline.html" class="nav-item active"><i class="fa-solid fa-diagram-project"></i><span class="nav-text">Pipeline</span></a>
                    <a href="../lenders/lender_management.html" class="nav-item"><i class="fa-solid fa-hand-holding-dollar"></i><span class="nav-text">Lenders</span></a>
                    <a href="../documents/document_vault.html" class="nav-item"><i class="fa-solid fa-folder-open"></i><span class="nav-text">Documents</span></a>
                    <a href="../user_management/user_management.html" class="nav-item"><i class="fa-solid fa-user-gear"></i><span class="nav-text">Users</span></a>
                    <a href="../reporting/reporting_logs.html" class="nav-item"><i class="fa-solid fa-chart-line"></i><span class="nav-text">Reports</span></a>`;
                }

                navHtml += `
                    <div style="flex:1;"></div>
                    <div class="nav-item" onclick="openProfileDrawer()" title="Profile" style="cursor:pointer;"><i class="fa-solid fa-circle-user"></i><span class="nav-text">Profile</span></div>
                    <div class="nav-item" onclick="logout()" title="Logout"><i class="fa-solid fa-right-from-bracket"></i><span class="nav-text">Logout</span></div>`;
                nav.innerHTML = navHtml;
            }

            const html = [
                // Section 1: Lead Information (Paired internally for density)
                `<tr class="sec-row">
                    <td colspan="5">
                        <span class="flex items-center gap-2">
                            <i class="fa-solid fa-user text-slate-400"></i>Lead Information
                        </span>
                    </td>
                </tr>`,
                row('Lead ID', `<span style="font-family:monospace;font-weight:700">#${lead.id}</span>`, 'Assigned Agent', editField('agent', lead.agent)),
                row('Full Name', editField('name', lead.name), 'Priority', editField('priority', lead.priority)),
                row('Business', editField('business', lead.business), 'Lead Notes', isEditing ? editField('notes', lead.notes) : `<span style="color:#64748b;font-size:10px">${lead.notes}</span>`),

                // Section 2: Loan Details & Payout Tracking (SIDE BY SIDE)
                `<tr class="sec-row">
                    <td colspan="2">
                        <span class="flex items-center gap-2">
                            <i class="fa-solid fa-coins text-slate-400"></i>Loan Details
                        </span>
                    </td>
                    <td class="divider"></td>
                    <td colspan="2">
                        <span class="flex items-center gap-2">
                            <i class="fa-solid fa-money-bill-transfer text-slate-400"></i>Payout Tracking
                        </span>
                    </td>
                </tr>`,

                // Paired Rows for Loan vs Payout
                (() => {
                    const loanRows = [
                        ['Loan Amount', isEditing ? editField('amount', lead.amount) : `<span style="font-size:13px;font-weight:900;color:#0f172a">${lead.amount}</span>`],
                        ['Bank Name', editField('bank', lead.bank)],
                        ['Lender Partner', editField('lender', lead.lender)],
                        ['Current Stage', isEditing ? editField('stage', lead.stage) : `<span style="background:${stageBg[lead.stage]};color:${stageAccent[lead.stage]};border:1px solid ${stageAccent[lead.stage]}33;padding:2px 9px;border-radius:10px;font-size:9px;font-weight:700">${STAGE_LABELS[lead.stage]}</span>`],
                        ['Days in Stage', lead.days + ' day' + (lead.days !== 1 ? 's' : '')]
                    ];

                    const payoutRows = lead.payoutStatus === 'Yes' ? [
                        ['Payout Status', '<span class="text-emerald-600 font-black text-[10px]"><i class="fa-solid fa-circle-check mr-1"></i>CONFIRMED</span>'],
                        ['Lender Contact', (lendersDB[lead.lender]?.contact || 'N/A')],
                        ['Lender Email', (lendersDB[lead.lender]?.email || 'N/A')],
                        ['Lender Terms', (lendersDB[lead.lender]?.terms || 'N/A')],
                        ['Lender Phone', (lendersDB[lead.lender]?.phone || 'N/A')]
                    ] : [
                        ['Payout Status', '<span class="text-amber-600 font-black text-[10px]"><i class="fa-solid fa-clock mr-1"></i>PENDING</span>'],
                        ['Action Required', `<button onclick="notifyAccountManager()" class="bg-indigo-600 text-white px-3 py-1 rounded-md text-[8px] font-black hover:bg-indigo-700 transition-all shadow-sm active:scale-95"><i class="fa-solid fa-paper-plane mr-1"></i>Notify AM</button>`],
                        ['', ''], ['', ''], ['', ''] // Padding
                    ];

                    return Array.from({ length: Math.max(loanRows.length, payoutRows.length) }, (_, i) => {
                        const l = loanRows[i] || ['', ''];
                        const p = payoutRows[i] || ['', ''];
                        return `<tr>
                            <td class="lbl">${l[0]}</td><td class="val">${l[1]}</td>
                            <td class="divider"></td>
                            <td class="lbl">${p[0]}</td><td class="val">${p[1]}</td>
                        </tr>`;
                    }).join('');
                })(),

                // Documents + Activity Timeline
                `<tr class="sec-row">
                    <td colspan="2">
                        <span class="flex items-center gap-2">
                            <i class="fa-solid fa-folder-open text-slate-400"></i>Documents
                            <span class="text-[8px] text-slate-400 normal-case ml-2">${docs.length} files</span>
                        </span>
                    </td>
                    <td class="divider"></td>
                    <td colspan="2">
                        <span class="flex items-center gap-2">
                            <i class="fa-solid fa-timeline text-slate-400"></i>Activity Timeline
                        </span>
                    </td>
                </tr>`,

                ...Array.from({ length: Math.max(docs.length, timeline.length) }, (_, i) => {
                    const d = docs[i];
                    const t = timeline[i];
                    const leftCell = d ? `
                        <td class="lbl"><div class="w-5 h-5 bg-slate-100 rounded flex items-center justify-center text-[9px] text-slate-500"><i class="fa-regular fa-file-pdf"></i></div></td>
                        <td class="val">
                            <div class="flex items-center justify-between gap-2">
                                <span class="font-bold text-[10px]">${d.name}</span>
                                <div class="flex items-center gap-2 shrink-0">
                                    <span class="font-mono text-[8px] text-slate-400">${d.date}</span>
                                    <button onclick="previewDoc('${d.name}')" class="bg-slate-100 border border-slate-200 px-2 py-0.5 rounded text-[8px] font-bold text-slate-600 hover:bg-slate-200 transition-colors"><i class="fa-solid fa-eye mr-1"></i>Preview</button>
                                    <button class="bg-white border border-slate-200 px-2 py-0.5 rounded text-[8px] font-bold text-slate-600 hover:bg-slate-50 transition-colors"><i class="fa-solid fa-download mr-1"></i>Download</button>
                                </div>
                            </div>
                        </td>` : '<td class="lbl"></td><td class="val"></td>';

                    const rightCell = t ? `
                        <td class="lbl">
                            <div class="w-5 h-5 rounded-full flex items-center justify-center border-1.5" style="background:${t.done ? t.color + '22' : '#f1f5f9'};border-color:${t.done ? t.color + '44' : '#e2e8f0'}">
                                <i class="fa-solid ${t.icon}" style="font-size:8px;color:${t.done ? t.color : '#cbd5e1'}"></i>
                            </div>
                        </td>
                        <td class="val">
                            <div class="flex items-center justify-between gap-2">
                                <div>
                                    <span class="text-[10px] font-bold ${t.done ? 'text-slate-900' : 'text-slate-400'}">${t.label}</span>
                                    <span class="text-[9px] ${t.done ? 'text-slate-500' : 'text-slate-300'} ml-2">${t.sub}</span>
                                </div>
                                <span class="text-[8px] text-slate-400 font-mono">${t.done ? t.time : '—'}</span>
                            </div>
                        </td>` : '<td class="lbl"></td><td class="val"></td>';

                    return `<tr>${leftCell}<td class="divider"></td>${rightCell}</tr>`;
                }),

                // Notes + Reminders
                `<tr class="sec-row">
                    <td colspan="2">
                        <span class="flex items-center gap-2">
                            <i class="fa-solid fa-note-sticky text-slate-400"></i>Notes
                        </span>
                    </td>
                    <td class="divider"></td>
                    <td colspan="2">
                        <span class="flex items-center gap-2">
                            <i class="fa-solid fa-bell text-slate-400"></i>Reminders
                        </span>
                    </td>
                </tr>`,

                ...Array.from({ length: Math.max(notes.length, reminders.length) }, (_, i) => {
                    const n = notes[i];
                    const r = reminders[i];
                    const leftCell = n ? `
                        <td class="lbl">${n.author}</td>
                        <td class="val">
                            <div class="flex items-start justify-between gap-2">
                                <span class="text-[10px] text-slate-600 leading-normal">${n.text}</span>
                                <span class="text-[8px] text-slate-400 font-mono shrink-0">${n.time}</span>
                            </div>
                        </td>` : '<td class="lbl"></td><td class="val"></td>';

                    const typeColors = { Call: '#3b82f6', Meeting: '#8b5cf6', 'Follow-up': '#f59e0b', Document: '#10b981' };
                    const typeIcons = { Call: 'fa-phone', Meeting: 'fa-users', 'Follow-up': 'fa-rotate-right', Document: 'fa-file' };
                    const statusColors = { Pending: '#f59e0b', Completed: '#10b981', Overdue: '#ef4444' };

                    const rightCell = r ? `
                        <td class="lbl">
                            <div class="flex items-center gap-2">
                                <div class="w-4 h-4 rounded-full flex items-center justify-center" style="background:${typeColors[r.type]}15;border:1px solid ${typeColors[r.type]}33">
                                    <i class="fa-solid ${typeIcons[r.type]}" style="font-size:7px;color:${typeColors[r.type]}"></i>
                                </div>
                                <span class="text-[8px] font-bold uppercase" style="color:${typeColors[r.type]}">${r.type}</span>
                            </div>
                        </td>
                        <td class="val">
                            <div class="flex items-center justify-between gap-2">
                                <div><span class="text-[10px] font-bold text-slate-900">${r.title}</span><span class="text-[9px] text-slate-500 ml-2">${r.assignee}</span></div>
                                <div class="flex items-center gap-2 shrink-0">
                                    <span class="font-mono text-[8px] text-slate-400">${r.due}</span>
                                    <span class="text-[8px] font-bold px-1.5 py-0.5 rounded-full" style="background:${statusColors[r.status]}15;color:${statusColors[r.status]};border:1px solid ${statusColors[r.status]}33">${r.status}</span>
                                </div>
                            </div>
                        </td>` : '<td class="lbl"></td><td class="val"></td>';

                    return `<tr>${leftCell}<td class="divider"></td>${rightCell}</tr>`;
                }),

                // Inputs Row
                `<tr>
                    <td colspan="2" class="p-3 !border-b-0 align-top">
                        <textarea id="new-note-text" class="w-full border border-slate-200 rounded-lg p-2 text-[10px] outline-none focus:border-indigo-300 transition-colors" rows="2" placeholder="Write a note..."></textarea>
                        <div class="flex justify-end mt-2"><button onclick="saveNote()" class="btn btn-dark !py-1 !text-[8px]">Save Note</button></div>
                    </td>
                    <td class="divider !border-b-0"></td>
                    <td colspan="2" class="p-3 !border-b-0 align-top">
                        <div class="flex gap-2 flex-wrap">
                            <select id="new-rem-type" class="flex-1 border border-slate-200 rounded-lg px-2 py-1 text-[10px] font-bold outline-none"><option>Call</option><option>Meeting</option><option>Follow-up</option><option>Document</option></select>
                            <input id="new-rem-title" class="flex-[2] border border-slate-200 rounded-lg px-2 py-1 text-[10px] outline-none" placeholder="Task title...">
                            <input id="new-rem-date" type="date" class="flex-1 border border-slate-200 rounded-lg px-2 py-1 text-[10px] outline-none">
                        </div>
                        <div class="flex justify-between items-center mt-2">
                            <a href="../task_and_followups/task_management.html" class="text-[8px] text-indigo-600 font-bold hover:underline flex items-center gap-1"><i class="fa-solid fa-arrow-up-right-from-square"></i>Task Hub</a>
                            <button onclick="addReminder()" class="btn btn-dark !py-1 !text-[8px]">Add Reminder</button>
                        </div>
                    </td>
                </tr>`
            ].join('');

            const colgroup = `<colgroup>
                <col style="width:140px">
                <col>
                <col style="width:1px;background:#f1f5f9">
                <col style="width:140px">
                <col>
            </colgroup>`;
            document.getElementById('master-table').innerHTML = colgroup + html;
        }

        updateMasterTable();

        function previewDoc(name) {
            document.getElementById('previewFileName').innerText = name;
            document.getElementById('previewModal').style.display = 'flex';
        }
        function closePreview() { document.getElementById('previewModal').style.display = 'none'; }

        function getCurrentTimestamp() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        }

        function saveNote() {
            const el = document.getElementById('new-note-text');
            if(!el.value.trim()) return;
            notes.unshift({ author: 'You', time: getCurrentTimestamp(), text: el.value.trim() });
            el.value = '';
            updateMasterTable();
        }

        function addReminder() {
            const type = document.getElementById('new-rem-type').value;
            const title = document.getElementById('new-rem-title').value.trim();
            const date = document.getElementById('new-rem-date').value;
            if(!title || !date) return;
            reminders.unshift({ type, title, assignee: 'You', due: date, status: 'Pending' });
            document.getElementById('new-rem-title').value = '';
            updateMasterTable();
        }

        function notifyAccountManager() {
            const ts = getCurrentTimestamp();
            const today = ts.split(' ')[0];
            const msg = `SYSTEM ALERT: Admin requested an immediate payout update for this file from Account Manager (${lead.agent}).`;
            
            notes.unshift({ author: 'System', time: ts, text: msg });
            reminders.unshift({ type: 'Follow-up', title: 'URGENT: Payout Update Requested', assignee: lead.agent, due: today, status: 'Pending' });
            
            updateMasterTable();
            alert('Notification sent to Account Manager. A follow-up task and internal note have been created.');
        }
    </script>

    <!-- Preview Modal -->
    <div id="previewModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-[1000]" onclick="if(event.target===this)closePreview()">
        <div class="bg-white rounded-2xl w-[500px] max-w-[95vw] shadow-2xl overflow-hidden">
            <div class="p-4 border-b border-slate-100 flex items-center justify-between">
                <h3 class="text-[10px] font-black text-slate-900 uppercase tracking-widest">Document Preview</h3>
                <button onclick="closePreview()" class="text-slate-400 hover:text-rose-500"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-12 text-center">
                <div class="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto mb-4 text-slate-300">
                    <i class="fa-solid fa-file-pdf text-3xl"></i>
                </div>
                <p class="text-xs font-bold text-slate-600">Preview not available in demo mode.</p>
                <p class="text-[9px] text-slate-400 mt-1 font-mono">File: <span id="previewFileName"></span></p>
            </div>
            <div class="p-4 bg-slate-50 border-t border-slate-100 flex justify-end">
                <button onclick="closePreview()" class="btn btn-dark !text-[8px]">Close</button>
            </div>
        </div>
    </div>
<script src="../profile/profile_drawer.js"></script>
</body>
</html>
