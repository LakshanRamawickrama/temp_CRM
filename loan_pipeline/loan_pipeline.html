<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            background: #fff;
            margin: 0;
            display: flex;
        }

        ::-webkit-scrollbar { width: 3px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .side-nav {
            width: 70px;
            background: #0f172a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 4px;
            border-right: 1px solid #1e293b;
            flex-shrink: 0;
            overflow: hidden;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #94a3b8;
            transition: all .2s;
            cursor: pointer;
            text-decoration: none;
            padding: 6px 4px;
            border-radius: 8px;
            width: 54px;
        }

        .nav-item:hover,
        .nav-item.active {
            color: #fff;
            background: rgba(255,255,255,.08);
        }

        .nav-item i { font-size: 14px; }

        .nav-text {
            font-size: 7px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            text-align: center;
            line-height: 1;
        }

        .main-wrap {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
            background: #fafafa;
        }

        .top-bar {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .pipeline-scroll {
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .stage-col {
            flex-shrink: 0;
            width: 230px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: 100%;
        }

        .stage-header {
            border-radius: 10px 10px 0 0;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .stage-title {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .06em;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .stage-count {
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(255,255,255,.55);
        }

        .stage-body {
            flex: 1;
            border-radius: 0 0 10px 10px;
            padding: 8px;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            gap: 7px;
            min-height: 200px;
            transition: background .15s;
        }

        .stage-body.drag-over {
            background: rgba(99,102,241,.07) !important;
            outline: 2px dashed #6366f1;
            outline-offset: -3px;
        }

        .stage-collecting  .stage-header { background: #f1f5f9; color: #475569; }
        .stage-collecting  .stage-body   { background: #f8fafc; }
        .stage-collecting  .stage-count  { color: #475569; }

        .stage-verified    .stage-header { background: #eff6ff; color: #1d4ed8; }
        .stage-verified    .stage-body   { background: #f0f7ff; }
        .stage-verified    .stage-count  { color: #1d4ed8; }

        .stage-lender      .stage-header { background: #f5f3ff; color: #6d28d9; }
        .stage-lender      .stage-body   { background: #f6f4ff; }
        .stage-lender      .stage-count  { color: #6d28d9; }

        .stage-approved    .stage-header { background: #f0fdf4; color: #166534; }
        .stage-approved    .stage-body   { background: #f2fdf5; }
        .stage-approved    .stage-count  { color: #166534; }

        .stage-completed   .stage-header { background: #0f172a; color: #e2e8f0; }
        .stage-completed   .stage-body   { background: #f8fafc; }
        .stage-completed   .stage-count  { color: #94a3b8; background: rgba(255,255,255,.12); }

        .stage-rejected    .stage-header { background: #fef2f2; color: #b91c1c; }
        .stage-rejected    .stage-body   { background: #fff5f5; }
        .stage-rejected    .stage-count  { color: #b91c1c; }

        .lead-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 9px;
            padding: 10px 11px;
            cursor: grab;
            transition: box-shadow .15s, transform .15s, opacity .15s;
            user-select: none;
            position: relative;
        }

        .lead-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); transform: translateY(-1px); }
        .lead-card.dragging { opacity: .45; transform: rotate(1.5deg) scale(.97); cursor: grabbing; }

        .card-priority-bar { position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px; border-radius: 0 2px 2px 0; }
        .priority-high   { background: #ef4444; }
        .priority-medium { background: #f59e0b; }
        .priority-low    { background: #10b981; }

        .card-id { font-size: 8px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; }
        .card-name { font-size: 11px; font-weight: 800; color: #0f172a; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-amount { font-size: 12px; font-weight: 800; color: #0f172a; margin-top: 5px; }
        .card-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
        .card-agent { font-size: 8px; font-weight: 600; color: #64748b; display: flex; align-items: center; gap: 4px; }
        .card-days { font-size: 8px; font-weight: 700; color: #94a3b8; display: flex; align-items: center; gap: 3px; }
        .card-bank { font-size: 8px; color: #94a3b8; font-weight: 600; margin-top: 4px; display: flex; align-items: center; gap: 3px; }
        .card-actions { display: flex; align-items: center; justify-content: flex-end; gap: 5px; margin-top: 7px; padding-top: 7px; border-top: 1px solid #f1f5f9; }
        .card-btn { font-size: 8px; font-weight: 700; padding: 3px 8px; border-radius: 5px; cursor: pointer; border: none; transition: all .15s; text-transform: uppercase; letter-spacing: .04em; }
        .btn-view { background: #f1f5f9; color: #475569; }
        .btn-view:hover { background: #e2e8f0; }

        .input-clean { background: #fff; border: 1px solid #cbd5e1; border-radius: 7px; padding: 6px 12px; font-size: 10px; font-weight: 600; color: #1e293b; outline: none; font-family: 'Inter', sans-serif; }
        .input-clean:focus { border-color: #6366f1; box-shadow: 0 0 0 2px #e0e7ff; }

        /* Modal Styles */
        .modal-backdrop, .confirm-backdrop, .update-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,.45); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(2px); animation: fadeIn .15s ease; }
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-box, .confirm-box, .update-box { background: #fff; border-radius: 14px; width: 520px; max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.18); animation: slideUp .18s ease; }
        .confirm-box { width: 420px; overflow: hidden; }
        .update-box { width: 480px; }

        .modal-header, .confirm-header, .update-header { padding: 18px 20px 14px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: flex-start; justify-content: space-between; }
        .confirm-header { background: #0f172a; border-bottom: none; }

        .modal-close { width: 28px; height: 28px; border-radius: 7px; border: none; background: #f1f5f9; color: #64748b; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all .15s; }
        .modal-close:hover { background: #e2e8f0; color: #0f172a; }

        /* Update Fields */
        .update-section { padding: 16px 20px; border-bottom: 1px solid #f8fafc; }
        .update-section-title { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: .07em; color: #94a3b8; margin-bottom: 12px; }
        .update-label { display: block; font-size: 9px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
        .update-input { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 11px; font-size: 11px; font-weight: 500; color: #0f172a; outline: none; transition: border-color .15s; }
        .update-input:focus { border-color: #6366f1; background: #fff; box-shadow: 0 0 0 2px #e0e7ff; }

        .checklist-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 7px; cursor: pointer; margin-bottom: 6px; }
        .checklist-item input[type="checkbox"] { width: 14px; height: 14px; accent-color: #4f46e5; }
        .checklist-item label { font-size: 10px; font-weight: 600; color: #374151; flex: 1; cursor: pointer; }

        .confirm-footer, .update-footer { padding: 14px 20px; border-top: 1px solid #f1f5f9; display: flex; gap: 8px; justify-content: flex-end; }
        .btn-cancel-move { padding: 8px 18px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; color: #64748b; font-size: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-confirm-move, .btn-save-move { padding: 8px 20px; border-radius: 8px; border: none; background: #0f172a; color: #fff; font-size: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        .btn-save-move { background: #4f46e5; }

        /* Drawer */
        #drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:900; opacity:0; pointer-events:none; transition:opacity .25s; }
        #drawer-overlay.open { opacity:1; pointer-events:all; }
        #create-lead-drawer { position:fixed; top:0; right:-520px; width:500px; height:100vh; background:#fff; z-index:901; display:flex; flex-direction:column; box-shadow:-8px 0 40px rgba(0,0,0,.15); transition:right .3s cubic-bezier(.4,0,.2,1); }
        #create-lead-drawer.open { right:0; }
    </style>
</head>

    <script>
        const STAGES = ['collecting','verified','lender','approved','completed','rejected'];
        const STAGE_LABELS = { collecting:'Doc Collection', verified:'Doc Verified', lender:'Lender Selection', approved:'Loan Approved', completed:'Completed', rejected:'Rejected' };
        
        let leads = [
            { id:'AF-028', name:'Minosh Example', business:'ex ABC', amount:'£3,456', agent:'Sarah White', bank:'Starling', stage:'verified', priority:'High', days:3, lender:'NAB', notes:'Awaiting final sign-off.' },
            { id:'AF-027', name:'ABC Corp', business:'ABCD Ltd', amount:'£2,345', agent:'Cody Lane', bank:'—', stage:'verified', priority:'Medium', days:5, lender:'Commonwealth Bank', notes:'Docs reviewed.' },
            { id:'AF-026', name:'Kavi', business:'No Company', amount:'£34,567', agent:'Sarah White', bank:'—', stage:'collecting', priority:'Low', days:8, lender:'—', notes:'Waiting on bank statements.' },
            { id:'AF-029', name:'Priya', business:'No Company', amount:'£456.90', agent:'Sarah White', bank:'—', stage:'collecting', priority:'Medium', days:2, lender:'—', notes:'ID docs pending.' },
            { id:'AF-001', name:'Robert Miller', business:'Miller Logistics', amount:'£250,000', agent:'Cody Lane', bank:'Barclays', stage:'collecting', priority:'High', days:12, lender:'—', notes:'Missing payslips.' }
        ];

        let dragId = null, pendingMoveId = null, pendingMoveStage = null;

        function renderBoard() {
            const q = (document.getElementById('pipeline-search').value || '').toLowerCase();
            const agentF = document.getElementById('pipeline-agent').value;
            const prioF = document.getElementById('pipeline-priority').value;

            STAGES.forEach(s => {
                const col = document.getElementById('col-' + s);
                col.innerHTML = '';
                const filtered = leads.filter(l => l.stage === s && (!q || l.name.toLowerCase().includes(q) || l.id.toLowerCase().includes(q)) && (!agentF || l.agent === agentF) && (!prioF || l.priority === prioF));
                document.getElementById('count-' + s).textContent = filtered.length;
                filtered.forEach(l => {
                    const card = document.createElement('div');
                    card.className = 'lead-card';
                    card.draggable = true;
                    card.innerHTML = `<div class="card-priority-bar ${l.priority==='High'?'priority-high':l.priority==='Medium'?'priority-medium':'priority-low'}"></div><div class="card-id">${l.id}</div><div class="card-name">${l.name}</div><div class="card-amount">${l.amount}</div><div class="card-meta"><span class="card-agent">${l.agent}</span><span class="card-days">${l.days}d</span></div>`;
                    card.addEventListener('dragstart', () => { dragId = l.id; setTimeout(()=>card.classList.add('dragging'),0); });
                    card.addEventListener('dragend', () => card.classList.remove('dragging'));
                    col.appendChild(card);
                });
            });
        }

        function filterCards() { renderBoard(); }

        function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        function onDrop(e, stage) {
            e.preventDefault(); e.currentTarget.classList.remove('drag-over');
            if(!dragId) return;
            const l = leads.find(x => x.id === dragId);
            if(l && l.stage !== stage) {
                pendingMoveId = dragId; pendingMoveStage = stage;
                showConfirmMove(l, stage);
            }
            dragId = null;
        }

        function showConfirmMove(l, to) {
            document.getElementById('confirm-lead-id').textContent = l.id;
            document.getElementById('confirm-lead-name').textContent = l.name;
            document.getElementById('confirm-message').textContent = `Move this lead to ${STAGE_LABELS[to]}?`;
            document.getElementById('confirm-from-pill').textContent = STAGE_LABELS[l.stage];
            document.getElementById('confirm-to-pill').textContent = STAGE_LABELS[to];
            document.getElementById('confirm-backdrop').classList.remove('hidden');
        }

        function cancelMove() { document.getElementById('confirm-backdrop').classList.add('hidden'); }
        function confirmMove() { cancelMove(); openUpdateModal(); }

        function openUpdateModal() {
            const l = leads.find(x => x.id === pendingMoveId);
            document.getElementById('update-lead-name-title').textContent = `${l.name} -> ${STAGE_LABELS[pendingMoveStage]}`;
            document.getElementById('update-form-body').innerHTML = `<div class="p-4"><label class="update-label">Stage Specific Notes</label><textarea id="upd-notes" class="update-input h-20">${l.notes}</textarea></div>`;
            document.getElementById('update-backdrop').classList.remove('hidden');
        }

        function closeUpdateModal() { document.getElementById('update-backdrop').classList.add('hidden'); }

        function saveAndMove() {
            const l = leads.find(x => x.id === pendingMoveId);
            l.stage = pendingMoveStage;
            l.notes = document.getElementById('upd-notes').value;
            l.days = 0;
            renderBoard();
            closeUpdateModal();
        }

        function openAddModal() { document.getElementById('create-lead-drawer').classList.add('open'); document.getElementById('drawer-overlay').classList.add('open'); }
        function closeAddModal() { document.getElementById('create-lead-drawer').classList.remove('open'); document.getElementById('drawer-overlay').classList.remove('open'); }

        function saveNewLead() {
            const n = document.getElementById('clf-name').value, c = document.getElementById('clf-company').value, a = document.getElementById('clf-amount').value;
            if(!n || !c || !a) return alert('Fill required fields');
            leads.unshift({ id: 'AF-'+Math.floor(Math.random()*1000), name:n, business:c, amount:a, agent:document.getElementById('clf-agent').value, stage:'collecting', priority:document.getElementById('clf-priority').value, days:0, lender:'—', notes:document.getElementById('clf-notes').value });
            renderBoard(); closeAddModal();
        }

        renderBoard();
    </script>
</body>
</html>
