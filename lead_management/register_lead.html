<script>
// Role-based nav + dashboard link
(function(){
    const s = window._crmSession;
    if (!s) return;
    const el = document.getElementById('nav-dashboard');
    if (el && s.landing) el.href = '../dashboard/' + s.landing.split('/').pop();
    const ROLE_NAV = {
        'Admin':            ['nav-tasks','nav-leads','nav-pipeline','nav-lenders','nav-docs','nav-users','nav-reports'],
        'Team Leader':      ['nav-tasks','nav-leads'],
        'Tele Agent':       ['nav-tasks','nav-leads'],
        'Accounts Manager': ['nav-tasks','nav-leads','nav-lenders']
    };
    const allowed = ROLE_NAV[s.role] || ROLE_NAV['Admin'];
    ['nav-tasks','nav-leads','nav-pipeline','nav-lenders','nav-docs','nav-users','nav-reports'].forEach(id => {
        const node = document.getElementById(id);
        if (node && !allowed.includes(id)) node.style.display = 'none';
    });
})();
</script>

                        <option>Warm</option>
                        <option>Hot</option>
                        <option>Cold</option>
                    </select>
                </div>
                <div class="col-span-2-of-3">
                    <label class="label-premium">Email Address</label>
                    <input type="email" id="task-email" placeholder="mail@lead.com" class="form-input-premium" style="background:#fff;">
                </div>
                <div style="display:flex;gap:10px;">
                    <div style="flex:1;">
                        <label class="label-premium">Date</label>
                        <input type="date" id="task-date" class="form-input-premium" style="background:#fff;">
                    </div>
                    <div style="flex:1;">
                        <label class="label-premium">Time</label>
                        <input type="time" id="task-time" class="form-input-premium" style="background:#fff;">
                    </div>
                </div>
                <div class="col-span-2-of-3">
                    <label class="label-premium">Notes / Instructions</label>
                    <textarea id="task-notes" rows="2" placeholder="..." class="form-input-premium resize-none" style="background:#fff;"></textarea>
                </div>
                <div style="display:flex;align-items:flex-end;">
                    <button type="button" onclick="createTask()"
                        style="width:100%;padding:10px;background:#2447d7;color:#fff;border:none;border-radius:10px;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;font-family:'Inter',sans-serif;"
                        onmouseover="this.style.background='#1a38b1'" onmouseout="this.style.background='#2447d7'">
                        Create Task
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer Actions -->
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:10px;padding-bottom:24px;">
            <button onclick="goBack()" style="height:36px;padding:0 22px;background:#f1f5f9;border:none;border-radius:10px;font-size:9px;font-weight:800;color:#64748b;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;font-family:'Inter',sans-serif;">
                Cancel
            </button>
            <button onclick="saveLead()" style="height:36px;padding:0 26px;background:#2447d7;color:#fff;border:none;border-radius:10px;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Inter',sans-serif;">
                <i class="fa-solid fa-check text-[8px]"></i> Save Lead
            </button>
        </div>

    </div><!-- end scrollable body -->
</div><!-- end main-content -->

<script>
    // Auto-generate Case ID on load
    const caseId = 'AF-CASE-' + Math.floor(1000 + Math.random() * 9000);
    document.getElementById('case-id-display').textContent = caseId;

    function goBack() {
        if (document.referrer) {
            history.back();
        } else {
            const s = window._crmSession;
            if (s && s.landing) {
                window.location.href = '../dashboard/' + s.landing.split('/').pop();
            } else {
                window.location.href = '../lead_management/lead_management.html';
            }
        }
    }

    function setContact(method) {
        document.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('contact-' + method);
        if (btn) btn.classList.add('active');
    }

    function toggleExistingLoanSection(value) {
        const section = document.getElementById('existing-loan-details');
        if (value === 'Yes') {
            section.classList.remove('hidden');
        } else {
            section.classList.add('hidden');
        }
    }

    function handleDocUpload(input) {
        const container = document.getElementById('doc-list-container');
        if (!input.files || input.files.length === 0) return;
        Array.from(input.files).forEach(file => {
            const docItem = document.createElement('div');
            docItem.className = 'flex items-center justify-between p-1.5 bg-white border border-gray-50 rounded-lg shadow-sm mb-1';
            docItem.innerHTML = `
                <div class="flex items-center gap-2 overflow-hidden">
                    <i class="fa-solid fa-file-pdf text-[10px] text-red-500"></i>
                    <span class="text-[9px] font-bold text-gray-700 truncate">${file.name}</span>
                </div>
                <button onclick="this.parentElement.remove()" class="text-gray-300 hover:text-red-500 transition-colors ml-2 flex-shrink-0">
                    <i class="fa-solid fa-xmark text-[9px]"></i>
                </button>
            `;
            container.appendChild(docItem);
        });
        input.value = '';
    }

    // Sync contact info into follow-up fields
    function initSyncListeners() {
        const sync = () => {
            document.getElementById('task-client').value = document.getElementById('field-fullName').value;
            document.getElementById('task-phone').value = document.getElementById('field-phoneNumber').value;
            document.getElementById('task-email').value = document.getElementById('field-emailAddress').value;
        };
        document.getElementById('field-fullName').addEventListener('input', sync);
        document.getElementById('field-phoneNumber').addEventListener('input', sync);
        document.getElementById('field-emailAddress').addEventListener('input', sync);
    }

    function createTask() {
        const desc = document.getElementById('task-desc').value.trim();
        if (!desc) { alert('Please enter a task description'); return; }
        alert('Task scheduled successfully!');
    }

    function saveLead() {
        const fullName = document.getElementById('field-fullName').value.trim();
        if (!fullName) { alert('Full Name is required'); document.getElementById('field-fullName').focus(); return; }

        const loanAmount = document.getElementById('field-loanAmount').value.trim();
        if (!loanAmount) { alert('Amount Needed is required'); document.getElementById('field-loanAmount').focus(); return; }

        const newLead = {
            id: caseId,
            fullName,
            title: document.getElementById('field-title').value,
            dob: document.getElementById('field-dob').value,
            companyName: document.getElementById('field-companyName').value,
            jobTitle: document.getElementById('field-jobTitle').value,
            companyHouseNumber: document.getElementById('field-companyHouseNumber').value,
            businessAnnualTurnover: document.getElementById('field-businessAnnualTurnover').value,
            emailAddress: document.getElementById('field-emailAddress').value,
            phoneNumber: document.getElementById('field-phoneNumber').value,
            residentialAddress: document.getElementById('field-residentialAddress').value,
            previousAddress: document.getElementById('field-previousAddress').value,
            timeAtCurrentAddress: document.getElementById('field-timeAtCurrentAddress').value,
            homeOwner: document.getElementById('field-homeOwner').value,
            loanAmount,
            fundingTimeline: document.getElementById('field-fundingTimeline').value,
            loanPurpose: document.getElementById('field-loanPurpose').value,
            companyBank: document.getElementById('field-companyBank').value,
            industry: document.getElementById('field-industry').value,
            leadSource: document.getElementById('field-leadSource').value,
            creditConsent: document.getElementById('field-creditConsent').value,
            existingLoan: document.getElementById('field-existingLoan').value,
            overdraftFacility: document.getElementById('field-overdraftFacility').value,
            previousAlphaFundingLoan: document.getElementById('field-previousAlphaFundingLoan').value,
            leadStatus: document.getElementById('field-leadStatus').value || 'Warm',
            preferredContactMethod: (document.querySelector('.radio-btn.active') || {}).textContent?.trim() || 'Email',
            additionalComments: document.getElementById('field-additionalComments').value,
            createdAt: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }),
            documents: [],
            tasks: []
        };

        // Pass to lead_management via sessionStorage
        sessionStorage.setItem('new_lead_data', JSON.stringify(newLead));

        alert('Lead saved successfully!');
        window.location.href = '../lead_management/lead_management.html';
    }

    initSyncListeners();
</script>
</body>
</html>
